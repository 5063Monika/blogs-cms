<div class="container">
  <div class="header">
    <h2>Blog Dashboard</h2>
  </div>
  <mat-form-field appearance="outline">
    <mat-label>Search Blogger</mat-label>
    <input
      matInput
      (keyup)="searchText.set($any($event.target).value)" >
  </mat-form-field>
  <mat-form-field appearance="outline">
    <mat-label>Category</mat-label>
    <mat-select
      (selectionChange)="selectedCategory.set($event.value)" >
      <mat-option value="all">
        All
      </mat-option>
      <mat-option value="food">
        Food
      </mat-option>
      <mat-option value="makeup">
        Makeup
      </mat-option>
      <mat-option value="travel">
        Travel
      </mat-option>
    </mat-select>

  </mat-form-field>
  <table
    mat-table
    [dataSource]="filteredBlogs()"
    class="mat-elevation-z8 full-width"  >
    <ng-container matColumnDef="title">
      <th mat-header-cell *matHeaderCellDef>
        Title
      </th>
      <td mat-cell *matCellDef="let blog">
        {{ blog.title }}
      </td>
    </ng-container>
    <ng-container matColumnDef="category">
      <th mat-header-cell *matHeaderCellDef>
        Category
      </th>
      <td mat-cell *matCellDef="let blog">
        {{ blog.category }}
      </td>
    </ng-container>
    <ng-container matColumnDef="author">
      <th mat-header-cell *matHeaderCellDef>
        Author
      </th>
      <td mat-cell *matCellDef="let blog">
        {{ blog.authorName }}
      </td>
    </ng-container>
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>
        Status
      </th>
      <td mat-cell *matCellDef="let blog">
        <span
          [class.published]="blog.status === 'published'"
          [class.draft]="blog.status === 'draft'">
          {{ blog.status }}
        </span>
      </td>
    </ng-container>
    <ng-container matColumnDef="readingTime">
      <th mat-header-cell *matHeaderCellDef>
        Reading Time
      </th>
      <td mat-cell *matCellDef="let blog">
        {{ blog.readingTime }} min
      </td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>
        Actions
      </th>
      <td mat-cell *matCellDef="let blog">
  <div class="action-buttons">
    <button *ngIf="isOwner(blog)" mat-raised-button color="primary"
      (click)="editBlog(blog._id)">
      Edit
    </button>
    <button *ngIf="isOwner(blog)" mat-raised-button color="warn"
      (click)="deleteBlog(blog._id)">
      Delete
    </button>
  </div>
</td>
    </ng-container>
    <tr
      mat-header-row
      *matHeaderRowDef="displayedColumns" ></tr>
    <tr
      mat-row
      *matRowDef="
        let row;
        columns: displayedColumns "
      [class.highlight]="
        row.status === 'published'"></tr>
  </table>
</div>
