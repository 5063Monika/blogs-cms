<div class="container ">
  <div class="register-card">
    <h2>Register</h2>
    <mat-form-field appearance="outline">
      <mat-label>Name</mat-label>
      <input matInput placeholder="Enter your name" [(ngModel)]="name">
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Email</mat-label>
      <input matInput placeholder="Enter your email" [(ngModel)]="email">
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Password</mat-label>
      <input matInput type="password" placeholder="Enter your password" [(ngModel)]="password">
    </mat-form-field>
    <button mat-raised-button color="primary" (click)="register()">Register</button>
  </div>
</div>
